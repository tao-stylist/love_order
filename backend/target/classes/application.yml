server:
  port: 8080

spring:
  application:
    name: love-order-backend

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/love_order_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT 配置
jwt:
  secret: LoveOrderSecretKey2024ForWeChatMiniProgramJwtTokenGenerationAndValidation
  expiration: 604800000  # 7天（毫秒）

# 文件上传路径
file:
  upload-path: ./uploads/
  access-path: /uploads/**

# SpringDoc 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# 日志配置
logging:
  level:
    com.loveorder: debug
    org.hibernate.SQL: debug
